<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Просмотр видео</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="videos-data.js"></script>
</head>
<body>
    <div class="container">
        <div class="back-button" id="backButton">
            <span>← Назад</span>
        </div>
        
        <h1 class="video-title" id="videoTitle">Загрузка...</h1>
        
        <div class="video-player-container">
            <div class="video-player" id="videoPlayer">
                <!-- Видео будет добавлено динамически -->
            </div>
        </div>
        
        <div class="video-description" id="videoDescription">
            Загрузка описания...
        </div>
        
        <button class="confirm-button" id="confirmButton">Подтвердить</button>
    </div>

    <script src="video.js"></script>
</body>
</html>
