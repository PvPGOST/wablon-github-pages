<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Видео</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="videos-data.js"></script>
</head>
<body>
    <div class="container">
        <div class="back-button" id="backButton">
            <span>Назад</span>
        </div>
        
        <div class="video-player-container">
            <div class="video-player" id="videoPlayer">
                <!-- Видео будет добавлено динамически -->
            </div>
        </div>
        
        <div class="video-info">
            <div class="video-number" id="videoNumber">Номер</div>
            <div class="video-instruction">Нажмите кнопку "Продолжить"</div>
        </div>
        
        <div class="spacer"></div>
        
        <div class="footer">
            <button class="confirm-button" id="confirmButton">ВЫБРАТЬ ШАБЛОН</button>
        </div>
    </div>

    <script src="video.js"></script>
</body>
</html>
