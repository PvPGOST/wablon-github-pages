<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Просмотр видео</title>
    <link rel="stylesheet" href="styles.css?v=2.2">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="videos-data.js"></script>

    <style>
        /* Встроенные базовые стили на случай проблем с загрузкой CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            background-color: #0d0d0d;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .video-player-container {
            width: 100%;
            background-color: #000000;
            overflow: hidden;
            margin-bottom: 0;
            min-height: 250px;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }
        .video-player {
            width: 100%;
            min-height: 250px;
            position: relative;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none !important;
        }
        .video-player iframe, .video-player video {
            width: 100%;
            height: 100%;
            border: none !important;
            min-height: 250px;
            display: block;
            max-height: 80vh;
        }
        .video-info {
            padding: 15px;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            position: relative;
        }
        .video-number {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: left;
            word-wrap: break-word;
            overflow: hidden;
        }
        .video-instruction {
            font-size: 14px;
            opacity: 0.9;
            text-align: left;
            word-wrap: break-word;
            overflow: hidden;
        }
        .spacer {
            flex-grow: 0;
            height: 20px;
        }
        .footer {
            text-align: center;
            padding: 15px;
            background-color: #121721;
            margin-top: auto;
            color: #ffffff;
        }
        video {
            min-height: 250px;
            width: 100%;
            object-fit: contain;
            background-color: #000;
            border: none !important;
        }
        video::-webkit-media-controls-start-playback-button {
            display: none !important;
        }
        .navigation-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0;
        }
        .video-navigation {
            display: flex;
            gap: 10px;
        }
        .confirm-button {
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navigation-bar">
            <div id="backButton" class="back-button">Назад</div>
            <div class="video-navigation">
                <div id="prevButton" class="prev-button">◀ Пред.</div>
                <div id="nextButton" class="next-button">След. ▶</div>
            </div>
        </div>
        
        <div class="video-player-container">
            <div id="videoContainer" class="video-player"></div>
        </div>
        
        <div class="video-info">
            <div class="video-header">
                <div id="videoTitle" class="video-number"></div>
                <div class="video-actions">
                    <button id="favoriteButton" class="favorite-button-video">
                        <span class="favorite-icon">★</span>
                    </button>
                    <div class="likes-container-video">
                        <button id="likeButton" class="like-button-video">
                            <span class="like-icon">🤍</span>
                        </button>
                        <span id="likeCount" class="like-count-video">0</span>
                    </div>
                </div>
            </div>
            <div id="videoDescription" class="video-instruction">Описание шаблона</div>
            <button id="confirmButton" class="confirm-button">ВЫБРАТЬ ШАБЛОН</button>
        </div>
    </div>

    <script type="module" src="stagewise-init.js"></script>
    <script src="video.js"></script>
</body>
</html>
