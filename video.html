<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Просмотр видео</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="videos-data.js"></script>
    <style>
        /* Встроенные базовые стили на случай проблем с загрузкой CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            background-color: #0d0d0d;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .back-button {
            display: inline-block;
            margin: 10px;
            padding: 8px 16px;
            cursor: pointer;
            color: #fff;
            background-color: #ff0000;
            border-radius: 5px;
            font-weight: 500;
        }
        .video-player-container {
            width: 100%;
            background-color: #000000;
            overflow: hidden;
            margin-bottom: 0;
        }
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
        }
        .video-player iframe, .video-player video {
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-info {
            padding: 15px;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
        }
        .video-number {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .video-instruction {
            font-size: 14px;
            opacity: 0.9;
        }
        .confirm-button {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #ff0000;
            color: #ffffff;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            margin-top: auto;
        }
        .spacer {
            flex-grow: 1;
        }
        .footer {
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-button" id="backButton">
            <span>Назад</span>
        </div>
        
        <div class="video-player-container">
            <div class="video-player" id="videoPlayer">
                <!-- Видео будет добавлено динамически -->
            </div>
        </div>
        
        <div class="video-info">
            <div class="video-number" id="videoNumber">Номер</div>
            <div class="video-instruction">Нажмите кнопку "Продолжить"</div>
        </div>
        
        <div class="spacer"></div>
        
        <div class="footer">
            <button class="confirm-button" id="confirmButton">ВЫБРАТЬ ШАБЛОН</button>
        </div>
    </div>

    <script src="video.js"></script>
</body>
</html>
