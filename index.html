<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выберите шаблон</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="videos-data.js"></script>
    <style>
        /* Встроенные базовые стили на случай проблем с загрузкой CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            background-color: #0d0d0d;
            margin: 0;
            padding: 0;
        }
        .page-title {
            text-align: center;
            padding: 15px 0;
            font-size: 20px;
            color: #ff0000;
            background-color: #121721;
            margin-bottom: 0;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            padding: 4px;
        }
        .video-preview {
            position: relative;
            aspect-ratio: 1/1;
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            background-color: #ffffff;
        }
        .video-preview.selected {
            border-color: #ff0000;
        }
        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">Выберите шаблон</h1>
        <div class="video-grid" id="videoGrid">
            <!-- Видео будут добавлены через JavaScript -->
        </div>
    </div>

    <script>
    // Встроенный скрипт для отладки
    document.addEventListener('DOMContentLoaded', function() {
        // Telegram Web App
        if (window.Telegram && window.Telegram.WebApp) {
            let tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }
        
        // Загрузка видео
        if (typeof videoData !== 'undefined' && Array.isArray(videoData)) {
            const grid = document.getElementById('videoGrid');
            videoData.forEach(video => {
                const div = document.createElement('div');
                div.className = 'video-preview';
                div.setAttribute('data-id', video.id);
                div.innerHTML = `
                    <img class="preview-image" src="${video.preview_url}" alt="${video.title}">
                `;
                div.addEventListener('click', () => {
                    localStorage.setItem('selectedVideoId', video.id);
                    window.location.href = `video.html?id=${video.id}`;
                });
                grid.appendChild(div);
            });
            
            // Проверка выбранного ранее видео
            const savedId = localStorage.getItem('selectedVideoId');
            if (savedId) {
                const selected = document.querySelector(`.video-preview[data-id="${savedId}"]`);
                if (selected) selected.classList.add('selected');
            }
        } else {
            console.error('Данные о видео не загружены');
        }
    });
    </script>
    <script src="app.js"></script>
</body>
</html>
